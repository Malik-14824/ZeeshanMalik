<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Zeeshan Malik</title>
    <link rel="icon" type="image/jpeg" href="assets/images/Favicon.jpg" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#06ccf9",
              "background-light": "#f5f8f8",
              "background-dark": "#0f1f23",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <link href="assets/css/main.css" rel="stylesheet" />
    <link href="assets/css/responsive.css" rel="stylesheet" />
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display selection:bg-primary/30"
  >
    <div id="comp-header"></div>
    <div id="sect-hero"></div>
    <div id="sect-about"></div>
    <div id="sect-skills"></div>
    <div id="sect-services"></div>
    <div id="sect-projects"></div>
    <div id="sect-experience"></div>
    <div id="sect-contact"></div>
    <div id="comp-footer"></div>

    <button
      aria-label="Switch theme"
      class="theme-toggle"
      id="theme-toggle"
      type="button"
    >
      <span class="material-symbols-outlined" id="theme-toggle-icon"
        >light_mode</span
      >
    </button>

    <!-- Component Loader -->
    <script>
      async function loadComponent(elementId, file) {
        try {
          const response = await fetch(file);
          if (response.ok) {
            const html = await response.text();
            document.getElementById(elementId).outerHTML = html;
          }
        } catch (error) {
          console.error(`Error loading ${file}:`, error);
        }
      }

      async function initializeApp() {
        // Load all sections sequentially to maintain structure
        await loadComponent("comp-header", "components/header.html");

        // Header is guaranteed in DOM here — bind hamburger directly
        (function bindHamburger() {
          var btn = document.getElementById("mobile-menu-btn");
          var menu = document.getElementById("mobile-menu");
          var overlay = document.getElementById("mobile-menu-overlay");
          var icon = document.getElementById("mobile-menu-icon");
          if (!btn || !menu) return;

          function openMenu() {
            menu.classList.add("is-open");
            menu.setAttribute("aria-hidden", "false");
            btn.classList.add("is-open");
            btn.setAttribute("aria-expanded", "true");
            btn.setAttribute("aria-label", "Close menu");
            if (overlay) overlay.classList.add("is-open");
            if (icon) icon.textContent = "close";
          }

          function closeMenu() {
            menu.classList.remove("is-open");
            menu.setAttribute("aria-hidden", "true");
            btn.classList.remove("is-open");
            btn.setAttribute("aria-expanded", "false");
            btn.setAttribute("aria-label", "Open menu");
            if (overlay) overlay.classList.remove("is-open");
            if (icon) icon.textContent = "menu";
          }

          btn.addEventListener("click", function () {
            menu.classList.contains("is-open") ? closeMenu() : openMenu();
          });
          if (overlay) overlay.addEventListener("click", closeMenu);
          menu.querySelectorAll('a[href^="#"]').forEach(function (link) {
            link.addEventListener("click", function (event) {
              var hash = link.getAttribute("href");
              if (!hash || hash === "#" || !document.querySelector(hash)) {
                closeMenu();
                return;
              }

              // Let the panel collapse first so anchor landing uses the final header height.
              event.preventDefault();
              closeMenu();

              window.setTimeout(function () {
                if (window.location.hash === hash) {
                  window.dispatchEvent(new HashChangeEvent("hashchange"));
                  return;
                }
                window.location.hash = hash;
              }, 380);
            });
          });
          document.addEventListener("keydown", function (e) {
            if (e.key === "Escape") closeMenu();
          });
          var mq = window.matchMedia("(min-width: 768px)");
          function onMqChange(e) {
            if (e.matches) closeMenu();
          }
          if (typeof mq.addEventListener === "function") {
            mq.addEventListener("change", onMqChange);
          } else if (typeof mq.addListener === "function") {
            mq.addListener(onMqChange);
          }
        })();

        await loadComponent("sect-hero", "sections/hero.html");
        await loadComponent("sect-about", "sections/about.html");
        await loadComponent("sect-skills", "sections/skills.html");
        await loadComponent("sect-services", "sections/services.html");
        await loadComponent("sect-projects", "sections/projects.html");
        await loadComponent("sect-experience", "sections/experience.html");
        await loadComponent("sect-contact", "sections/contact.html");
        await loadComponent("comp-footer", "components/footer.html");

        const contactForm = document.getElementById("contact-form");
        const contactEmailInput = contactForm?.querySelector(
          'input[name="email"]',
        );
        const contactSubmitButton = contactForm?.querySelector(
          'button[type="submit"]',
        );
        const successMessage = document.getElementById(
          "contact-success-message",
        );

        if (contactEmailInput) {
          contactEmailInput.addEventListener("input", () => {
            contactEmailInput.setCustomValidity("");
          });

          contactEmailInput.addEventListener("invalid", () => {
            contactEmailInput.setCustomValidity(
              "Please enter a valid email address (example: john@example.com).",
            );
          });
        }

        if (contactForm) {
          contactForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            if (!contactForm.checkValidity()) {
              contactForm.reportValidity();
              return;
            }

            const originalButtonText =
              contactSubmitButton?.textContent || "Send Message";
            if (contactSubmitButton) {
              contactSubmitButton.disabled = true;
              contactSubmitButton.textContent = "Sending...";
            }

            try {
              const formData = new FormData(contactForm);
              formData.set("_captcha", "false");

              const response = await fetch(
                "https://formsubmit.co/ajax/zeeshan.malik14824@gmail.com",
                {
                  method: "POST",
                  headers: {
                    Accept: "application/json",
                  },
                  body: formData,
                },
              );

              if (!response.ok) {
                throw new Error("Failed to submit form");
              }

              contactForm.classList.add("hidden");
              if (successMessage) {
                successMessage.classList.remove("hidden");
              }
            } catch (error) {
              window.alert(
                "Something went wrong while sending your message. Please try again.",
              );
            } finally {
              if (contactSubmitButton) {
                contactSubmitButton.disabled = false;
                contactSubmitButton.textContent = originalButtonText;
              }
            }
          });
        }

        // Dynamically load scripts AFTER DOM is fully built
        const scripts = [
          "assets/js/animations.js",
          "assets/js/theme.js",
          "assets/js/scrollspy.js",
        ];

        scripts.forEach((src) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          document.body.appendChild(script);
        });

        // Re-execute project filters script if present inside projects.html
        const filtersScript = document.querySelector("#projects script");
        if (filtersScript) {
          const newScript = document.createElement("script");
          newScript.textContent = filtersScript.textContent;
          document.body.appendChild(newScript);
        }
      }

      document.addEventListener("DOMContentLoaded", initializeApp);
    </script>
  </body>
</html>
